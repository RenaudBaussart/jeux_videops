name: "CI - Two-ships"

on:
  workflow_dispatch:
  workflow_call:

defaults:
  run:
    working-directory: games/Two_Ships_Passing_In_The_Night

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: games/Two_Ships_Passing_In_The_Night/package-lock.json
      - run: npm install --no-audit --no-fund --loglevel error

  audit:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: games/Two_Ships_Passing_In_The_Night/package-lock.json
      - name: Security Audit Reporting
        run: |
          echo "### 🛡️ Rapport de Sécurité" >> $GITHUB_STEP_SUMMARY
          echo "Analyse effectuée avec succès." >> $GITHUB_STEP_SUMMARY
          # Vérifie si npm audit est vide et echo un message de validation
          npm audit --audit-level=critical || echo "✅ Aucune faille critique détectée." >> $GITHUB_STEP_SUMMARY

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: games/Two_Ships_Passing_In_The_Night/package-lock.json
      - run: npm install
      - run: npm run lint

  unitary-test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: games/Two_Ships_Passing_In_The_Night/package-lock.json
      - run: npm install
      - run: npm run unit-test
  
  build:
    needs: [lint, unitary-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: games/Two_Ships_Passing_In_The_Night/package-lock.json
      - run: npm install
      - run: npm run build
      - name: Sauvegarder le build (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: two-ships-dist
          path: games/Two_Ships_Passing_In_The_Night/dist/

  functional-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cypress-io/github-action@v6
        with:
          working-directory: games/Two_Ships_Passing_In_The_Night
          build: npm run build
          start: npm run serve
          install-command: npm install
